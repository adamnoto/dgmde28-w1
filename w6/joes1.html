
<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<title>Joe's Hotdogs - Adam</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Waiting+for+the+Sunrise&display=swap" rel="stylesheet">
<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
/>


<style>
body {
    font-family: 'Waiting for the Sunrise', cursive; 
    margin: 10px 50px; 
    letter-spacing: 6px; 
    font-weight: bold;
    font-size: 25px;
    margin: 0 auto;
    text-align: center;
    text-align: center;
}

a:hover {
    background: rgb(169, 169, 232);
}

img {
    width: 100%;
}

.tttboard {
    display: flex;
    justify-content: center;
}

.tttrow {
    width: 396px;
}

.square {
    height: 100px;
    width: 100px;
    border: 1px solid black;
    display: inline-block;
    margin: 5px;
}

.square:hover {
    background: #efefef;
}

.square span {
    display: table-cell;
    font-size: 40px;
    height: 100px;
    width: 100px;
    vertical-align: middle;
}

#board-info {
    border: 4px dotted green;
    display: inline-block;
    padding: 5px 28px;
    margin-bottom: 15px;
}
</style>

<body>
  <script>
    let menu;

    // using array

    menu = []
    menu["hotdogs"] = 4
    menu["fries"] = 3.5
    menu["soda"] = 1.5
    menu["sauerkraut"] = 1

    for (item in menu) {
      document.write(`<p>${item}: $${menu[item]}`)
    }    
    document.write("<hr/>")

    // using object

    menu = {
      hotdogs: 4,
      fries: 3.5,
      soda: 1.5,
      sauerkraut: 1
    }

    for (item in menu) {
      document.write(`<p>${item}: $${menu[item]}</p>`)
    }
    document.write("<hr/>")

    // using class

    function Item(name, price) {
      this.name = name
      this.price = price
    }

    menu = [
      new Item("hotdogs", 4),
      new Item("fries", 3.5),
      new Item("soda", 1.5),
      new Item("sauerkraut", 1)
    ]

    for (item of menu) {
      document.write(`<p>${item.name}: $${item.price}</p>`)
    }
  </script>
</body>

</html>

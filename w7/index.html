<body>
    <h1 style="margin-bottom: 5px;">Wordle</h1>

  <!--
    - if not word, not accepted
    - if correct position green
    - if incorrect position yellow
    - user can type
    - if not word in any spot dark gray
    - base color is darker dark gray
  -->

    <div class='debug-container'>
      <input type="checkbox" id="debug-check"></input><label for='debug-check'>debug</label>
    </div>

    <div class="stats-container">
      <p>Win: <span id="win-counter">0</span></p>
      <p>Lose: <span id="lose-counter">0</span></p>
    </div>

    <div class="board">
        <div class="row" id="wordle-row">
            <script type="application/javascript">
                const WORD_LENGTH = 5
                const MAX_ATTEMPTS = 6

                function getCharBoxClass(row, col) {
                  return `sq${row}_${col}`
                }

                function getCharBox(row, col) {
                  return document.getElementById(getCharBoxClass(row, col))
                }

                function enterAtCharBox(row, col, char) {
                  el = getCharBox(row, col)
                  el.style.border = "1px solid gray"
                  el.children[0].innerText = char
                }

                for (i = 0; i<MAX_ATTEMPTS; i++) {
                  for (j = 0; j<WORD_LENGTH; j++) {
                    id = getCharBoxClass(i, j);
                    document.write("<div class='square' id='" + id + "'><span>X</span></div>")
                  }
                }
            </script>
        </div>

        <div id="hidden-board-content" style="display: none;">
          <p>Loading...</p>
        </div>
    </div>

    <button onclick='restart();'>Start game</button>
    <script>
      // if "show" then the world board will be shown, and the hidden one will be hidden
      // and reversely, on "hidden", the hidden one will be shown instead of the wordle board
      function toggleBoard(state) {
        var hiddenBoardContentEl = document.getElementById("hidden-board-content")
        var wordleRow = document.getElementById("wordle-row")

        let showWordleBoard = state === "show"
        wordleRow.style.display = showWordleBoard ? "block" : "none"
        hiddenBoardContentEl.style.display = showWordleBoard ? "none" : "block"
      }

      function cleanUpBoard() {
        console.debug("Cleaning up the board")
        let squares = document.getElementsByClassName("square")
        let count = squares.length
        for (i = 0; i < count; i++) {
          squares[i].children[0].innerText = ""
          squares[i].style.border = "1px solid gray"
          squares[i].style.color = "white"
          squares[i].classList.remove("disabled")
        }
      }

      function generateWord(wordLength, callback) {
        if (wordLength <= 0) return null

        let idx = Math.floor(Math.random() * window.words.length);
        callback(window.words[idx])
      }

      function restart() {
        console.debug("Restarting the game")
        window.currentRow = 0
        window.currentCol = 0
        window.wordleInDebugMode = document.getElementById("debug-check").checked

        toggleBoard("hidden")
        generateWord(WORD_LENGTH, (word) => {
          cleanUpBoard()
          toggleBoard("show")
          hookTyping(word)
        })

        // set the focus to the document, to move it away from the start game
        // so that pressing enter is not triggering a state reset
        document.activeElement.blur()
      }

      /**
       * 1) Accept any valid ASCII word
       * 2) On special "Backspace" press, delete the last entered character
       * 3) On special "Enter" press:
       *    a) If the word is less than WORD_LENGTH, shows red border since there's missing char
       *    b) If the word is == WORD_LENGTH, call assessWord() to test the word
       */
      function hookTyping(correctAnswer) {
        // if not inputable, any press of the keyboard is ignored
        let inputable = true

        window.onkeydown = (event) => {
          var key = event.key

          if (!inputable) return

          if (event.code === "Backspace") {
            if (window.currentCol === 0) {
              enterAtCharBox(window.currentRow, window.currentCol, "")
            } else {
              enterAtCharBox(window.currentRow, window.currentCol - 1, "")
              window.currentCol -= 1
            }
            return
          } else if (event.code >= 'KeyA' && event.code <= 'KeyZ') {
            key = key.toLowerCase()

            enterAtCharBox(window.currentRow, window.currentCol >= WORD_LENGTH ? window.currentCol - 1 : window.currentCol, key)

            // move to the next box
            if ((window.currentCol + 1) <= WORD_LENGTH)
              window.currentCol += 1
          } else if (key === "Enter") {
            if (window.currentCol < WORD_LENGTH) {
              for (i = 0; i < WORD_LENGTH; i++)
                markNormalAt(i) // clear all other
              markRedAt(window.currentCol)
            } else {
              for (i = 0; i < WORD_LENGTH; i++) markUsabilityAt(i, false)
              inputable = false
              assessWord(correctAnswer, ({ isValidWord, isCorrectGuess }) => {
                inputable = true
                for (i = 0; i < WORD_LENGTH; i++)
                  markUsabilityAt(i, true)

                if (isValidWord) {
                  if ((window.currentRow + 1) === MAX_ATTEMPTS) {
                    if (!isCorrectGuess) {
                      alert("You lost! The word was: " + correctAnswer)
                      inputable = false

                      // increase the lose rate
                      const currentWinRate = parseInt(document.getElementById("lose-counter").textContent)
                      document.getElementById("lose-counter").textContent = currentWinRate + 1
                    }
                  } else {
                    window.currentRow += 1
                    window.currentCol = 0
                  }

                  if (isCorrectGuess) {
                    alert("Congratulations!")
                    inputable = false

                    // increase the win rate
                    const currentWinRate = parseInt(document.getElementById("win-counter").textContent)
                    document.getElementById("win-counter").textContent = currentWinRate + 1
                  }
                }
              })
            }
          }
        }
      }

      function getEnteredWord() {
        word = ""
        for (i = 0; i < WORD_LENGTH; i++) {
          word = word + getCharBox(window.currentRow, i).innerText
        }
        return word
      }

      // utility functions to give color at a specific position of the current attempt's row
      function markColorAt(pos, color) { getCharBox(window.currentRow, pos).style.border = "1px solid " + color }
      // apply red border color for a character at a specific position in the current attempt's row
      function markRedAt(pos) { markColorAt(pos, "red") }
      // apply gray border color for a character at a specific position in the current attempt's row
      function markNormalAt(pos) { markColorAt(pos, "gray") }
      // apply yellow border color for a character at a specific position in the current attempt's row
      function markYellowAt(pos) { markColorAt(pos, "yellow") }
      // apply green border color for a character at a specific position in the current attempt's row
      function markGreenAt(pos) { markColorAt(pos, "green") }
      // apply gray text color for a character at a specific position in the current attempt's row
      function markGrayAt(pos) { getCharBox(window.currentRow, pos).style.color = "#5d5d5d" }
      // apply specific coloring to indicate if a character at certain position is "disabled" (locked)
      function markUsabilityAt(pos, isUsable) {
        let charBox = getCharBox(window.currentRow, pos)
        if (isUsable) charBox.classList.remove("disabled")
        else charBox.classList.add("disabled")
      }

      /**
       * Assess whether the word is correct/sensible, and mark the letter board accordingly.
       * Upon checking, a callback function will be called. The callback is mainly called/designed
       * for interactivity and animation restoration.
       */
      function assessWord(correctAnswer, callback) {
        var guess = getEnteredWord()
        var req = new XMLHttpRequest()

        req.onreadystatechange = function() {
          if (this.readyState === XMLHttpRequest.DONE) {
            let responseCode = this.status
            let isCorrectGuess = true
            if (responseCode === 200) {
              // convert answer to dictionary of letters frequency
              let lettersFreq = {}
              correctAnswer.split("").forEach(c => {
                if (lettersFreq[c]) lettersFreq[c]++
                else lettersFreq[c] = 1
              })

              // mark each letter board correctly
              for (i = 0; i < WORD_LENGTH; i++) {
                let c = guess[i]; // the current character evaluated
                if (correctAnswer[i] === c) markGreenAt(i)
                else if (lettersFreq[c] && lettersFreq[c] > 0) markYellowAt(i)
                else markGrayAt(i)

                isCorrectGuess &= (correctAnswer[i] === guess[i])
                lettersFreq[c] -= 1
              }
            } else {
              alert("Not a valid word!")
            }
            callback({
              isValidWord: responseCode === 200,
              isCorrectGuess: isCorrectGuess
            })
          }
        }

        console.debug("Entered word:", word,window.wordleInDebugMode
          ? `correct answer: ${correctAnswer}`
          : ".")

        req.open('GET', `https://api.dictionaryapi.dev/api/v2/entries/en/${guess}`, true)
        req.send()
      }

      // start when DOM is fully loaded
      document.addEventListener("DOMContentLoaded", function() {
        restart()

        // listen to debug mode check and unchecking
        document.getElementById("debug-check").onclick = () => {
          window.wordleInDebugMode = document.getElementById("debug-check").checked
        }
      });
